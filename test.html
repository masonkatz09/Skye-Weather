<!DOCTYPE html>
<html>
<head><title>Skye API Test</title>
<style>body{font-family:monospace;background:#111;color:#eee;padding:20px;}pre{background:#222;padding:12px;border-radius:8px;overflow-x:auto;white-space:pre-wrap;}h2{color:#3A8DFF;}button{background:#3A8DFF;border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;margin:4px;}button:hover{background:#1F4F8C;}.ok{color:#4ade80;}.fail{color:#f87171;}</style>
</head>
<body>
<h2>Skye API Tester</h2>
<button onclick="test('forecast')">Test Forecast</button>
<button onclick="test('alerts')">Test Alerts</button>
<button onclick="test('postal')">Test Postal (M6C3E9)</button>
<button onclick="test('ec')">Test EC (Toronto)</button>
<button onclick="test('alertdetail')">Test Alert Detail</button>
<div id="out"></div>
<script>
async function test(type) {
  const out = document.getElementById('out');
  out.innerHTML = '<p>Testing ' + type + '...</p>';
  try {
    let url = '/api/weather?type=' + type + '&lat=43.6532&lon=-79.3832&city=Toronto';
    if (type === 'postal') url = '/api/weather?type=postal&postal=M6C3E9';
    const r = await fetch(url);
    const text = await r.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch(e) { parsed = text; }
    const isOk = r.ok;
    const hasFSA = type === 'postal' && text.includes('Humewood');
    const hasAlert = type === 'alerts' && text.includes('severity');
    out.innerHTML = `
      <h2 class="${isOk?'ok':'fail'}">${type}: ${r.status} ${r.ok?'OK':'FAILED'}</h2>
      ${type==='postal'?'<p class="'+(hasFSA?'ok':'fail')+'">'+(hasFSA?'✅ Has neighbourhood data':'❌ Missing neighbourhood data')+'</p>':''}
      ${type==='alerts'?'<p class="'+(hasAlert?'ok':'fail')+'">'+(hasAlert?'✅ Has alert data':'❌ No alert data')+'</p>':''}
      <pre>${JSON.stringify(parsed,null,2).slice(0,2000)}</pre>`;
  } catch(e) {
    out.innerHTML = '<p class="fail">ERROR: ' + e.message + '</p>';
  }
}
</script>
</body>
</html>
